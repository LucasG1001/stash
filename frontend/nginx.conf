server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: qualquer rota desconhecida cai no index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy da API para o backend (mesma rede do compose).
    # proxy_pass sem URI preserva o caminho original, então /api/anime/...
    # chega ao server como /api/anime/... (que é o que o backend espera).
    location /api/ {
        proxy_pass http://server:3333;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache de assets estáticos com hash no nome
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
